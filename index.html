<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toy Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9f9f9;
    }

    header {
      background: #ff6f61;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    nav {
      background: #333;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-size: 16px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    .card h3 {
      margin: 10px 0;
    }

    .price {
      color: green;
      font-size: 18px;
      font-weight: bold;
    }

    .btn {
      background: #ff6f61;
      color: white;
      border: none;
      padding: 10px 15px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn:hover {
      background: #e65a50;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  Toy Store 🧸
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Shop</a>
  <a href="#">Contact</a>
</nav>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/300x200" alt="Toy Car">
    <h3>Toy Car</h3>
    <p class="price">₹299</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200" alt="Teddy Bear">
    <h3>Teddy Bear</h3>
    <p class="price">₹499</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200" alt="Building Blocks">
    <h3>Building Blocks</h3>
    <p class="price">₹699</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200" alt="Doll">
    <h3>Doll</h3>
    <p class="price">₹399</p>
    <button class="btn">Buy Now</button>
  </div>

</div>

<footer>
  © 2026 Toy Store | All Rights Reserved
</footer>

</body>
</html>
